name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff

      - name: Ruff (logic only)
        run: ruff check rgcc/

  test:
    name: Tests (${{ matrix.python-version }}, ${{ matrix.install-type }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        install-type: [client, server, full]

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          
          # Prepare packages with shared source
          cp -r rgcc/ packages/rgcc-client/
          cp -r rgcc/ packages/rgcc-server/
          find packages/ -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          
          if [ "${{ matrix.install-type }}" = "client" ]; then
            pip install -e packages/rgcc-client
          elif [ "${{ matrix.install-type }}" = "server" ]; then
            pip install -e packages/rgcc-server
          else
            pip install -e packages/rgcc-client
            pip install -e packages/rgcc-server
          fi

      - name: Test lazy loading (client - no server deps)
        if: matrix.install-type == 'client'
        run: |
          python -c "
          import sys
          from rgcc.client.cli import app
          assert 'starlette' not in sys.modules, 'starlette must not be imported on client'
          assert 'uvicorn' not in sys.modules, 'uvicorn must not be imported on client'
          print('OK: no server deps on client install')
          "

      - name: Test lazy loading (server - no client deps)
        if: matrix.install-type == 'server'
        run: |
          python -c "
          import sys
          from rgcc.server.__main__ import main
          assert 'rich' not in sys.modules, 'rich must not be imported on server'
          assert 'typer' not in sys.modules, 'typer must not be imported on server'
          print('OK: no client deps on server install')
          "

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  package-check:
    name: Build & Verify Packages
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        package: [rgcc-client, rgcc-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel - ${{ matrix.package }}
        run: |
          pip install build
          cp -r rgcc/ packages/${{ matrix.package }}/
          find packages/${{ matrix.package }}/rgcc -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find packages/${{ matrix.package }}/rgcc -name "*.pyc" -delete 2>/dev/null || true
          python -m build packages/${{ matrix.package }} --outdir dist/

      - name: Check wheel structure - ${{ matrix.package }}
        run: |
          python << 'EOF'
          import zipfile
          from pathlib import Path
          whl = list(Path("dist").glob("*.whl"))[0]
          print(f"Checking {whl}")
          with zipfile.ZipFile(whl, 'r') as zf:
              files = zf.namelist()
              assert any('rgcc/core/' in f for f in files), "rgcc/core missing"
              assert not any('__pycache__' in f for f in files), "Cache files included"
          print("Wheel structure OK")
          EOF

      - name: Install from wheel and verify
        run: |
          WHEEL=$(ls dist/*.whl | head -n 1)
          pip install "$WHEEL"
          if [ "${{ matrix.package }}" = "rgcc-client" ]; then rgcc --version; else rgccd --help; fi

  integration:
    name: Full Integration Test
    runs-on: ubuntu-latest
    needs: package-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install components
        run: |
          # Prepare client package
          cp -r rgcc/ packages/rgcc-client/
          find packages/rgcc-client/rgcc -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          
          # Prepare server package
          cp -r rgcc/ packages/rgcc-server/
          find packages/rgcc-server/rgcc -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          
          pip install -e packages/rgcc-client
          pip install -e packages/rgcc-server

      - name: Setup and Run Integration
        run: |
          mkdir -p .rgcc
          echo "server: {auth_token: 'test-token', host: '127.0.0.1', port: 4444}" > .rgcc/server.config.yaml
          echo "compilers: {g++: {default_args: ['-std=c++17']}}" >> .rgcc/server.config.yaml

          mkdir -p test_project/.rgcc
          printf '#include <iostream>\nint main() {\n    std::cout << "Hello Integration" << std::endl;\n    return 0;\n}\n' > test_project/main.cpp
          echo "client: {endpoint: 'http://127.0.0.1:4444', auth_token: 'test-token'}" > test_project/.rgcc/client.config.yaml

          rgccd > server.log 2>&1 &
          sleep 3

          cd test_project
          rgcc compile main.cpp -o test_app
          ./dist/test_app | grep "Hello Integration"
