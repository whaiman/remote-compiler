[project]
name = "rgcc-server"
version = "2.0.0"
description = "RGCC Server - remote build daemon"
authors = [{name = "whaiman"}]
dependencies = [
    "cryptography>=44.0.0",
    "PyYAML>=6.0",
    "starlette",
    "uvicorn",
    "python-multipart",
]
license = {text = "AGPL-3.0"}

[project.scripts]
rgccd = "rgcc.server.__main__:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where   = ["."]
include = ["rgcc", "rgcc.server", "rgcc.core", "rgcc.server.*"]
exclude = ["rgcc.client*", "tests*", "sample*"]