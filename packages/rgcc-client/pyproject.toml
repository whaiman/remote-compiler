[project]
name = "rgcc-client"
version = "2.0.0"
description = "RGCC Client - remote C/C++ compiler CLI"
authors = [{name = "whaiman"}]
dependencies = [
    "cryptography>=44.0.0",
    "PyYAML>=6.0",
    "httpx",
    "typer[all]",
    "rich",
]
license = {text = "AGPL-3.0"}

[project.scripts]
rgcc = "rgcc.client.cli:app"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where   = ["."]
include = ["rgcc", "rgcc.client", "rgcc.core", "rgcc.client.*"]
exclude = ["rgcc.server*", "tests*", "sample*"]